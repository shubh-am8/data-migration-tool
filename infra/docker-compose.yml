services:
  appdb:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: migration_app
      POSTGRES_USER: migration
      POSTGRES_PASSWORD: migration
    ports:
      - "5432:5432"
    volumes:
      - appdb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U migration -d migration_app"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    ports:
      - "80:80"
    environment:
      APP_DB_URL: jdbc:postgresql://appdb:5432/migration_app
      APP_DB_USER: migration
      APP_DB_PASSWORD: migration
      REDIS_HOST: redis
      REDIS_PORT: 6379
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production-min-32-chars!!}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev-encryption-key-32bytes-long!!!!}
      FRONTEND_URL: http://localhost
      GSPACE_WEBHOOK_URL: ${GSPACE_WEBHOOK_URL:-}
      ALLOWED_EMAIL_DOMAIN: ${ALLOWED_EMAIL_DOMAIN:-}
      AUTH_ENFORCED: ${AUTH_ENFORCED:-true}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      CORS_ALLOWED_ORIGINS: http://localhost
      WORKER_ID: worker-1
    depends_on:
      appdb:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  appdb_data:
