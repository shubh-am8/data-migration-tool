services:
  appdb:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: migration_app
      POSTGRES_USER: migration
      POSTGRES_PASSWORD: migration
    ports:
      - "5432:5432"
    volumes:
      - appdb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U migration -d migration_app"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  labdb:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: migration_lab
      POSTGRES_USER: migration
      POSTGRES_PASSWORD: migration
    ports:
      - "5433:5432"
    volumes:
      - labdb_data:/var/lib/postgresql/data
      - ./labdb/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U migration -d migration_lab"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  appdb_data:
  labdb_data:

# Hybrid local dev: ./run-local-dev.sh starts appdb + redis here, then API/Worker/Frontend on host.
#
# Full single-image stack (production-style):
#   docker compose -f infra/docker-compose.yml up --build
